services:
  backend:
    build: ./backend
    container_name: marketpulse_backend
    ports:
    - "8000:8000"
    env_file: ./backend/.env
    volumes:
    - .backend/data:/app/data
    restart: unless-stopped
    healthcheck: 
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
  fronted:
    build:
      context: ./frontend
      args: 
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: marketpulse_frontend
    ports:
    - "5173:5173"
    environment:
     - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
    - backend
    restart: unless-stopped 