<!doctype html>
<html lang="en">
  <head>
    <!--
      MomentumProdigy is built as a Vite single-page app. This HTML file stays
      intentionally small: React owns the interface after mounting into #root.
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="MomentumProdigy is an offline-first mastery-learning platform that turns curated course material into adaptive review, mini-lessons, worksheets, and guided practice."
    />
    <meta name="color-scheme" content="dark" />
    <title>MomentumProdigy — Mastery Learning Platform</title>
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  </head>
  <body>
    <!-- React renders the entire product inside this root element. -->
    <div id="root"></div>

    <!-- Vite starts the TypeScript/React application from src/main.tsx. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
